<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Workspace Dashboard</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
    .navbar { background-color: #1a237e; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    .user-badge { background-color: #0d47a1; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
    .logout-btn { background-color: #d32f2f; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr; gap: 30px; }
    @media (min-width: 768px) { .container { grid-template-columns: 1fr 2fr; } }
    .panel-card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .panel-card h2 { margin-top: 0; color: #1a237e; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; color: #444; font-weight: bold; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button.primary-btn { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
    .task-list { display: grid; grid-template-columns: 1fr; gap: 15px; }
    .task-card { background-color: #f8f9fa; border-left: 5px solid #ffc107; padding: 15px; border-radius: 4px; }
    .task-card.In_Progress { border-left-color: #17a2b8; }
    .task-card.Completed { border-left-color: #28a745; background-color: #f1f9f3; }
    .task-meta { font-size: 13px; color: #666; margin-top: 10px; display: flex; flex-direction: column; gap: 3px; }
    .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; float: right; text-transform: uppercase; }
    .badge-Pending { background-color: #ffeeba; color: #856404; }
    .badge-In_Progress { background-color: #d1ecf1; color: #0c5460; }
    .badge-Completed { background-color: #d4edda; color: #155724; }
  </style>
</head>
<body>

  <div class="navbar">
    <h2>Admin Corporate Project Board 🌐</h2>
    <div>
      <span id="adminBadge" class="user-badge">Admin</span>
      <button class="logout-btn" onclick="logout()">Log Out 🚪</button>
    </div>
  </div>

  <div class="container">
    <div class="panel-card">
      <h2>Create & Assign Task 🎯</h2>
      <form id="taskForm">
        <div class="form-group">
          <label>Task Title</label>
          <input type="text" id="title" placeholder="Develop Architecture" required>
        </div>
        <div class="form-group">
          <label>Task Details</label>
          <textarea id="desc" placeholder="Provide documentation parameters..." required style="height:80px;"></textarea>
        </div>
        <div class="form-group">
          <label>Assignee (Team Member Email)</label>
          <input type="email" id="email" placeholder="worker@company.com" required>
        </div>
        <button type="submit" class="primary-btn">Deploy Task 🚀</button>
      </form>
    </div>

    <div class="panel-card">
      <h2>Global Workspace Analytics Board</h2>
      <div id="adminTasks" class="task-list">Loading project tracking streams...</div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('userRole');
    
    if (!token || role !== 'Admin') { 
      localStorage.clear();
      window.location.href = 'index.html'; 
    }
    
    document.getElementById('adminBadge').innerText = `${localStorage.getItem('userName')} (Admin)`;

    async function loadTasks() {
      try {
        const res = await fetch(`${API_BASE}/tasks`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const tasks = await res.json();
        const container = document.getElementById('adminTasks');
        container.innerHTML = tasks.length === 0 ? "<p>No active tasks exist on the board.</p>" : "";
        
        tasks.forEach(t => {
          const div = document.createElement('div');
          div.className = `task-card ${t.status.replace(" ", "_")}`;
          div.innerHTML = `
            <span class="status-badge badge-${t.status.replace(" ", "_")}">${t.status}</span>
            <h3>${t.title}</h3>
            <p>${t.description}</p>
            <div class="task-meta">
              <span><strong>Assigned Worker:</strong> ${t.assignedTo ? t.assignedTo.name : 'Unassigned'} (${t.assignedTo ? t.assignedTo.email : ''})</span>
              <span><strong>Created By:</strong> ${t.createdBy ? t.createdBy.name : 'System'}</span>
            </div>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        document.getElementById('adminTasks').innerHTML = "<p style='color:red;'>Failed to load live sync data.</p>";
      }
    }

    document.getElementById('taskForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await fetch(`${API_BASE}/tasks/create`, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({
          title: document.getElementById('title').value,
          description: document.getElementById('desc').value,
          assignedToEmail: document.getElementById('email').value
        })
      });
      const data = await res.json();
      alert(data.message);
      if(res.ok) { document.getElementById('taskForm').reset(); loadTasks(); }
    });

    setInterval(loadTasks, 3000);
    function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    loadTasks();
  </script>
</body>
</html>
